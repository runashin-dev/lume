<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lume · AI 뷰티 컨설턴트</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --color-text-primary: #1c1c1e;
  --color-text-secondary: #76767f;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f9f9fb;
  --color-border-tertiary: #f2f2f7;
  --color-border-secondary: #e5e5ea;
  --color-point: #C8956C;
  --color-point-bg: #fdf8f4;
  --card-shadow: 0 8px 24px rgba(28, 28, 30, 0.04), 0 1px 2px rgba(28, 28, 30, 0.02);
  --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
  --border-radius-lg: 20px;
  --border-radius-md: 14px;
}

body { 
  background: #e5e5ea; 
  font-family: var(--font-sans); 
  min-height: 100vh; 
  -webkit-font-smoothing: antialiased; 
  display: flex;
  justify-content: center; 
  align-items: flex-start;
}

.app { 
  width: 100%;
  max-width: 480px; 
  margin: 0 auto; 
  background: var(--color-background-primary); 
  min-height: 100vh; 
  padding-bottom: 4rem; 
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.08); 
}

/* 스크롤 애니메이션 효과 */
.reveal {
  opacity: 0;
  transform: translateY(25px);
  transition: opacity 0.7s cubic-bezier(0.215, 0.610, 0.355, 1), 
              transform 0.7s cubic-bezier(0.215, 0.610, 0.355, 1);
}
.reveal.active {
  opacity: 1;
  transform: translateY(0);
}

/* 헤더 */
.header { text-align: center; padding: 1.25rem 1rem 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); position: sticky; top: 0; background: white; z-index: 10; }
.logo { font-size: 22px; font-weight: 600; letter-spacing: 0.08em; color: #1a1a1a; }
.logo span { color: var(--color-point); }
.tagline { font-size: 11px; color: var(--color-text-secondary); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; font-weight: 500; }

/* 스텝 네비 */
.step-nav { 
  display: flex; 
  align-items: center; 
  padding: 1.25rem 1.5rem; 
  background: var(--color-background-secondary); 
  border-bottom: 1px solid var(--color-border-tertiary);
}
.snav { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; opacity: 0.35; transition: all 0.3s; }
.snav.active { opacity: 1; }
.snav.done { opacity: 0.9; }
.snav-circle { 
  width: 32px; 
  height: 32px; 
  border-radius: 50%; 
  border: 1.5px solid var(--color-border-secondary); 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 12px; 
  font-weight: 600; 
  background: white; 
  color: var(--color-text-secondary);
  transition: all 0.3s ease;
}
.snav.active .snav-circle { 
  background: var(--color-point); 
  border-color: var(--color-point); 
  color: white; 
  box-shadow: 0 4px 12px rgba(200, 149, 108, 0.3); 
}
.snav.done .snav-circle { background: #EAF3DE; border-color: #C0DD97; color: #3B6D11; font-size: 14px; }
.snav-label { font-size: 11px; color: var(--color-text-secondary); text-align: center; font-weight: 500; }
.snav.active .snav-label { color: var(--color-point); font-weight: 700; }
.snav-line { height: 1px; flex: 0.4; background: var(--color-border-secondary); margin-bottom: 20px; }

/* 공통 UI */
.screen { display: none; padding: 1.25rem 1rem 0; }
.screen.active { display: block; }
.card { 
  background: var(--color-background-primary); 
  border: 1px solid var(--color-border-tertiary); 
  border-radius: var(--border-radius-lg); 
  padding: 1.5rem; 
  margin-bottom: 18px; 
  box-shadow: var(--card-shadow); 
}
.sec-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--color-point); font-weight: 700; margin-bottom: 8px; }
.card-title { font-size: 19px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 8px; letter-spacing: -0.02em; }
.card-body { font-size: 14px; color: var(--color-text-secondary); line-height: 1.6; }
.divider { height: 1px; background: var(--color-border-tertiary); margin: 16px 0; }
.cta-btn { width: 100%; padding: 16px; background: var(--color-point); color: white; border: none; border-radius: var(--border-radius-lg); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; transition: all 0.2s; box-shadow: 0 4px 12px rgba(200, 149, 108, 0.2); }
.cta-btn:hover { background: #B87E58; transform: translateY(-1px); }
.cta-btn:disabled { background: var(--color-border-secondary); cursor: not-allowed; box-shadow: none; transform: none; }
.ghost-btn { width: 100%; padding: 13px; background: transparent; color: var(--color-text-secondary); border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
.ghost-btn:hover { background: var(--color-background-secondary); }

/* 성별 선택 */
.gender-wrap { padding: 2.5rem 1.25rem 0; width: 100%; }
.gender-title { font-size: 22px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 8px; letter-spacing: -0.02em; }
.gender-sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 28px; line-height: 1.6; }
.gender-btns { display: flex; gap: 14px; }
.g-btn { flex: 1; padding: 28px 14px; border: 1.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); background: white; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); text-align: center; box-shadow: var(--card-shadow);
